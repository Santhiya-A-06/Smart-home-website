<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-page-wrapper animate-fade-in">
        <!-- Left Side: Registration Image -->
        <div class="login-image-side" style="background-image: url('assets/hero_bg.jpg');">
            <div class="login-image-content">
                <div class="logo" style="font-size: 3rem; margin-bottom: 2rem;"
                    onclick="window.location.href='index.html'"><span>SmartHub</span></div>
                <h2 class="gold-text" style="font-size: 2.5rem;">Join Our Community</h2>
                <p style="font-size: 1.2rem; color: #fff; max-width: 400px; margin: 0 auto;">Connect with premium
                    homeowners or unlock new growth for your service business.</p>
            </div>
        </div>

        <!-- Right Side: Registration Form -->
        <div class="login-form-side">
            <div style="width: 100%; max-width: 500px;">
                <div class="form-container" style="margin: 0; padding: 0; width: 100%; max-width: 100%;">
                    <h2 style="margin-bottom: 1rem;">Create Your Account</h2>
                    <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Join the standard of excellence in home
                        care.</p>

                    <form id="registerForm">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="username" placeholder="john_doe" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" placeholder="john@example.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>

                        <div class="form-group">
                            <label>Join As</label>
                            <select id="role" style="background: rgba(15, 23, 42, 0.5); color: white;">
                                <option value="user">User (Looking for Services)</option>
                                <option value="servicer">Service Provider (Worker)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Location (City)</label>
                            <input type="text" id="location" placeholder="e.g. New York" required>
                        </div>

                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; height: 55px; font-size: 1.1rem; background: var(--gold); margin-top: 1rem;">
                            Establish Account
                        </button>
                    </form>

                    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                        Already have an account? <a href="login.html"
                            style="color: var(--gold); text-decoration: none; font-weight: 600;">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                location: document.getElementById('location').value
            };

            try {
                await api.auth.register(userData);
                alert("Registration successful! Please login.");
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
